services:

  backend:
    build:
      context: ./event-planner-backend

    ports:
      - "8000:8000"

    env_file:
      - ./event-planner-backend/.env

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

  queue:
    build:
      context: ./event-planner-backend

    command: >
      sh -c "
        php artisan optimize:clear &&
        php artisan config:cache &&
        php artisan queue:work --tries=3 --timeout=90
      "

    env_file:
      - ./event-planner-backend/.env

    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

    restart: unless-stopped

  frontend:
    build:
      context: ./event-planner-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped

  db:
    image: mysql:8.0

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pSuperRootPassword" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    environment:
      - MYSQL_DATABASE=event_planner_DB
      - MYSQL_USER=event_user
      - MYSQL_PASSWORD=StrongPassword123
      - MYSQL_ROOT_PASSWORD=SuperRootPassword

    volumes:
      - db_data:/var/lib/mysql

    ports:
      - "3306:3306"

    restart: unless-stopped

volumes:
  db_data:
